<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeU Certificate Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 32px;
  }

  h1 {
    color: #fff;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* ── Certificate ── */
  #certificate {
    width: 900px;
    max-width: 100%;
    aspect-ratio: 16/9;
    background: #fff;
    border: 14px solid #3b82f6;
    outline: 6px solid #facc15;
    outline-offset: -20px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 40px 60px;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }

  /* corner decorations */
  #certificate::before,
  #certificate::after {
    content: '';
    position: absolute;
    width: 48px; height: 48px;
    border: 6px solid #facc15;
  }
  #certificate::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
  #certificate::after  { bottom: 10px; right: 10px; border-left: none; border-top: none; }

  .corner-br { position:absolute; bottom:10px; left:10px; width:48px; height:48px; border:6px solid #facc15; border-right:none; border-top:none; }
  .corner-tl { position:absolute; top:10px; right:10px; width:48px; height:48px; border:6px solid #facc15; border-left:none; border-bottom:none; }

  .cert-date {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1e40af;
    letter-spacing: 0.12em;
  }

  .cert-title {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    color: #3b82f6;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.1;
    text-shadow: 2px 2px 0 rgba(59,130,246,0.15);
  }

  .cert-subtitle {
    font-size: 1rem;
    color: #3b82f6;
    font-weight: 400;
  }

  .cert-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #2563eb;
    line-height: 1.2;
  }

  .cert-body {
    font-size: 0.95rem;
    color: #3b82f6;
    text-align: center;
    max-width: 500px;
    line-height: 1.6;
  }

  .cert-body strong {
    font-weight: 800;
    color: #1e3a8a;
  }

  .cert-logo {
    width: 70px;
    height: 70px;
    border: 4px solid #facc15;
    border-radius: 50%;
    object-fit: contain;
    background: #fff;
    padding: 4px;
  }

  .cert-footer {
    font-size: 0.8rem;
    font-weight: 700;
    color: #1e40af;
    letter-spacing: 0.08em;
  }

  .btn-group {
    display: flex;
    gap: 12px;
  }

  button {
    padding: 13px 28px;
    border: none;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
  button:active { transform: translateY(0); }

  .btn-pdf {
    background: #3b82f6;
    color: #fff;
  }

  .btn-img {
    background: #facc15;
    color: #1a1a2e;
  }
</style>
</head>
<body>

<h1>CodeU Certificate Generator</h1>

<div id="certificate">
  <div class="corner-br"></div>
  <div class="corner-tl"></div>

  <div class="cert-date" id="certDate"></div>
  <div class="cert-title">Certificate of Completion</div>
  <div class="cert-subtitle">This certifies that</div>
  <div class="cert-name" id="certName">{{ recipient_name }}</div>
  <div class="cert-body">
    Successfully achieved the requirements of the
    <strong id="certCourse">Introduction to Python Programming Course.</strong>
  </div>
  <img class="cert-logo" src="codeulogo.png" alt="CodeU Logo" onerror="this.style.display='none'">
  <div class="cert-footer">Awarded by: CodeU Learning Platform</div>
</div>

<div class="btn-group">
  <button class="btn-pdf" onclick="downloadPDF()">⬇ Download PDF</button>
  <button class="btn-img" onclick="downloadImage()">🖼 Download Image</button>
</div>

<script>
  // Set today's date
  const today = new Date();
  document.getElementById('certDate').textContent =
    `${today.getMonth()+1} / ${today.getDate()} / ${today.getFullYear()}`;

  async function captureCert() {
    const cert = document.getElementById('certificate');
    return await html2canvas(cert, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff'
    });
  }

  async function downloadPDF() {
    const canvas = await captureCert();
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width / 2, canvas.height / 2] });
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width / 2, canvas.height / 2);
    pdf.save('codeu-certificate.pdf');
  }

  async function downloadImage() {
    const canvas = await captureCert();
    const link = document.createElement('a');
    link.download = 'codeu-certificate.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>
</body>
</html>
