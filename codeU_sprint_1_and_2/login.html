<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src ="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://gitlab.cci.drexel.edu/cid/2526/fw1023/a4/codeu-website-project/-/raw/main/codeulogo.png">
</head>

<body>
    <header class="bg-blue-500 shadow-[0_4px_8px_0_rgba(37,99,235,0.4)]">
        <div class = "max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href = "dashboard.html">
                <img
                    src="https://gitlab.cci.drexel.edu/cid/2526/fw1023/a4/codeu-website-project/-/raw/main/codeulogo.png" 
                    alt="CodeU Logo" 
                    class="h-10 w-auto"
                    >
            </a>

            <nav class = "space-x-6">
                <a href = "dashboard.html" class = "text-yellow-300 hover:text-blue-600 font-bold">Home</a>
                <a href = "courses.html" class = "text-yellow-300 hover:text-blue-600 font-bold">Courses</a>
                <a href = "community.html" class = "text-yellow-300 hover:text-blue-600 font-bold">Community</a>
            </nav>
            <button class = "bg-yellow-300 text-black px-4 py-2 rounded-lg hover: bg-blue-700 transition hover:bg-blue-700">
                Log In
            </button>
        </div>
    </header>
    <section class="max-w-6xl mx-auto mt-10 bg-white border rounded-xl shadow-[0_4px_8px_0_rgba(37,99,235,0.3)] text-center py-10">
        <h2 class="text-5xl font-semibold text-blue-600">
            Welcome back! Let's keep coding.
        </h2>
    </section>
    <section class="mb-6 max-w-3xl mx-auto mt-10 bg-gray-200 border rounded-xl shadow-[0_4px_8px_0_rgba(37,99,235,0.3)] text-center py-8 px-20">
    
    <div class="mb-6">
        <label for="email" class="block mb-2 text-med font-bold text-blue-600 text-left">Email</label>
        <input type="email" id="email" class="shadow-[0_2px_12px_0_rgba(234,179,8,0.6)] outline-yellow-400 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="appleseedj@gmail.com" required />
    </div> 
    <div class="mb-6">
        <label for="password" class="block mb-2 text-med font-bold text-blue-600 text-left">Password</label>
        <input type="password" id="password" class="shadow-[0_2px_12px_0_rgba(234,179,8,0.6)] outline-yellow-400 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="********" required />
    </div> 
    <button class="mb-6 max-w-2xl mx-auto mt-10 bg-blue-600 border rounded-xl shadow-[0_4px_8px_0_rgba(37,99,235,0.3)] text-center py-8 px-20 hover:bg-blue-700">
        <h3 class="text-3xl font-bold text-yellow-300">
            Log In
        </h3>
    </button>
    </section>
    <h3 class= "text-2xl text-blue-600 text-center">
        Don't have an account? <a class="text-2xl font-extrabold text-blue-600 underline hover:text-blue-800" href="signup.html">Sign up</a>
    </h3>

<footer class="bg-gray-200 mt-20 py-16 ">
    <div class="max-w-6xl mx-auto px-4 text-center">
        
        <div class="flex justify-center gap-12 mb-8 text-lg">
            <a href="aboutus.html" class="hover:text-blue-600 transition">About Us</a>
            <a href="community.html" class="hover:text-blue-600 transition">Community</a>
            <a href="courses.html" class="hover:text-blue-600 transition">Courses</a>
            <a href="reviews.html" class="hover:text-blue-600 transition">Reviews</a>
            <a href="contact.html" class="hover:text-blue-600 transition">Contact</a>
        </div>
        <div class="flex justify-center gap-6 mb-8">
            <a href="">
                <img src="https://www.pngmart.com/files/13/Instagram-Logo-PNG-Pic.png" alt="Social Media" class="w-10 h-10">
            </a>
            <a href="">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Facebook_icon_%28black%29.svg/2048px-Facebook_icon_%28black%29.svg.png" alt="Social Media" class="w-10 h-10">
            </a>
            <a href="">
                <img src="https://images.freeimages.com/image/large-previews/f35/x-twitter-logo-on-black-circle-5694247.png?h=350" alt="Social Media" class="w-10 h-10">
            </a>
            <a href="">
                <img src="https://www.iconpacks.net/icons/1/free-youtube-icon-123-thumb.png" alt="Social Media" class="w-10 h-10">
            </a>
        </div>
        <div class="flex justify-center items-center gap-2 mb-4">
            <img src="https://gitlab.cci.drexel.edu/cid/2526/fw1023/a4/codeu-website-project/-/raw/main/codeulogo.png" alt="CodeU Logo" class="h-8">
            <span class="text-2xl font-bold">CODEU</span>
        </div>
        <p class="text-gray-600">2025 CodeU Team, Drexel University</p>
    </div>
</footer>
    
    
</body>
</html>
